
### `docker-compose.yml`
```yaml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: guinee_market_db
    environment:
      POSTGRES_USER: guinee_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: guinee_marketplace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - guinee_network

  redis:
    image: redis:7-alpine
    container_name: guinee_market_redis
    ports:
      - "6379:6379"
    networks:
      - guinee_network

  backend:
    build: ./backend
    container_name: guinee_market_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://guinee_user:${DB_PASSWORD}@postgres:5432/guinee_marketplace
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - guinee_network

  nginx:
    image: nginx:alpine
    container_name: guinee_market_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/static:/usr/share/nginx/html/static
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - guinee_network

volumes:
  postgres_data:

networks:
  guinee_network:
    driver: bridge
